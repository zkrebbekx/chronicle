name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    name: test (${{ matrix.module }}, go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.23", "1.24", "1.25"]
        module: [".", "examples"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.mod
      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -race -timeout 60s ./...

  # pgstore is a separate job rather than a matrix entry because it is the only
  # module that needs a database, and adding a service container to the matrix
  # would start Postgres for the two modules that do not.
  pgstore:
    name: test (pgstore, go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pgstore requires go 1.25: its test-only driver dependency (pgx v5.9+,
        # pinned for a memory-safety and a SQL-injection fix) sets that floor.
        # The root module is zero-dependency and keeps its 1.23..1.25 range.
        go: ["1.25"]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: chronicle
          POSTGRES_PASSWORD: chronicle
          POSTGRES_DB: chronicle
        ports:
          - 5432:5432
        # Without the health check the job races the container's startup and
        # fails intermittently on a cold runner.
        options: >-
          --health-cmd "pg_isready -U chronicle -d chronicle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
          # pgstore has a go.sum: the driver is a test dependency of this
          # module only. The root has none and must keep none.
          cache-dependency-path: pgstore/go.sum
      - name: Create btree_gist
        # The extension needs a role permitted to create it. Migrate issues the
        # CREATE EXTENSION itself, but doing it once here keeps the tests
        # honest about what they need rather than relying on the CI role being
        # a superuser by accident.
        env:
          PGPASSWORD: chronicle
        run: psql -h localhost -U chronicle -d chronicle -c 'CREATE EXTENSION IF NOT EXISTS btree_gist'
      - name: Test
        working-directory: pgstore
        env:
          CHRONICLE_TEST_DSN: postgres://chronicle:chronicle@localhost:5432/chronicle?sslmode=disable
        run: go test -race -timeout 300s ./...
      - name: Coverage
        working-directory: pgstore
        env:
          CHRONICLE_TEST_DSN: postgres://chronicle:chronicle@localhost:5432/chronicle?sslmode=disable
        run: |
          go test -coverprofile=coverage.out -timeout 300s ./...
          go tool cover -func=coverage.out | tail -1

  # The suite must pass on a machine with no database, or people stop running
  # it locally. This job asserts the skip path rather than trusting it.
  pgstore-no-database:
    name: test (pgstore, no database)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: pgstore/go.sum
      - name: Test without CHRONICLE_TEST_DSN
        working-directory: pgstore
        run: go test -race -timeout 60s ./...

  # chronicled shares pgstore's shape: it needs Postgres for its integration
  # suite, skips it cleanly without one, and inherits the same go 1.25 floor
  # through its pgx dependency.
  chronicled:
    name: test (chronicled, go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25"]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: chronicle
          POSTGRES_PASSWORD: chronicle
          POSTGRES_DB: chronicle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chronicle -d chronicle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: chronicled/go.sum
      - name: Create btree_gist
        env:
          PGPASSWORD: chronicle
        run: psql -h localhost -U chronicle -d chronicle -c 'CREATE EXTENSION IF NOT EXISTS btree_gist'
      - name: Test
        working-directory: chronicled
        env:
          CHRONICLE_TEST_DSN: postgres://chronicle:chronicle@localhost:5432/chronicle?sslmode=disable
        run: go test -race -timeout 300s ./...
      - name: Coverage
        working-directory: chronicled
        env:
          CHRONICLE_TEST_DSN: postgres://chronicle:chronicle@localhost:5432/chronicle?sslmode=disable
        run: |
          go test -coverprofile=coverage.out -coverpkg=./... -timeout 300s ./...
          go tool cover -func=coverage.out | tail -1

  # The handler suite runs entirely over MemStore; this job proves the fast
  # path stays fast and the integration suite skips cleanly on a machine with
  # no database.
  chronicled-no-database:
    name: test (chronicled, no database)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: chronicled/go.sum
      - name: Test without CHRONICLE_TEST_DSN
        working-directory: chronicled
        run: go test -race -timeout 60s ./...

  lint:
    name: lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [".", "pgstore", "chronicled"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # 1.25 so the linter can load pgstore and chronicled, whose pgx
          # dependency sets a 1.25 floor; the root module (1.23) loads fine too.
          go-version: "1.25"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: latest
          working-directory: ${{ matrix.module }}
